name: Daily Options Trading

on:
  schedule:
    - cron: '35 13 * * 1-5'  # 9:35 ET = 13:35 UTC, Monday-Friday
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create state directory
        run: mkdir -p state

      - name: Restore state from cache
        uses: actions/cache@v4
        with:
          path: state/
          key: trading-state-${{ github.run_id }}
          restore-keys: |
            trading-state-

      - name: Run position monitor (check exits)
        run: python position_monitor.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      - name: Fetch market data
        run: python -c "import data_fetcher; print(len(data_fetcher.build_full_market_context()), 'symbols loaded')"
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

      - name: Run full trading pipeline
        run: python main.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          LOG_LEVEL: INFO

      - name: Save state
        uses: actions/cache/save@v4
        with:
          path: state/
          key: trading-state-${{ github.run_id }}

      - name: Upload state as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-state-${{ github.run_id }}
          path: state/
          retention-days: 30
