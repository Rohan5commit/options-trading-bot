name: Retrain on Lightning.ai

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'build_dataset'
        type: choice
        options:
          - build_dataset
          - check_status
          - full_instructions

jobs:
  build-dataset:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'build_dataset' || github.event.inputs.action == 'full_instructions' }}
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build training dataset
        run: python finetune/build_dataset.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

      - name: Upload dataset as artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-data
          path: training_data/
          retention-days: 7

  check-status:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'check_status' }}
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check training status
        run: python finetune/lightning_helper.py status
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_CHECKPOINT_REPO: Rohan5commit/options-llm-checkpoints

  show-instructions:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'full_instructions' }}
    timeout-minutes: 5

    steps:
      - name: Print Lightning.ai Instructions
        run: |
          echo "=========================================="
          echo "  Lightning.ai Training Instructions"
          echo "=========================================="
          echo ""
          echo "GPU: L4 at \$0.60/hr"
          echo "Budget: \$45 total across accounts"
          echo ""
          echo "SETUP (First Account):"
          echo "1. Go to https://lightning.ai"
          echo "2. Create account (get free credits)"
          echo "3. Open Studio with L4 GPU"
          echo "4. In Studio terminal:"
          echo "   git clone https://github.com/Rohan5commit/options-trading-bot.git"
          echo "   cd options-trading-bot"
          echo "   export HF_TOKEN=your_hf_token"
          echo "   export HF_CHECKPOINT_REPO=Rohan5commit/options-llm-checkpoints"
          echo "   bash finetune/run_lightning.sh"
          echo ""
          echo "ACCOUNT SWITCHING:"
          echo "1. When budget runs out, close Studio"
          echo "2. Create new Lightning.ai account"
          echo "3. Open new Studio with L4 GPU"
          echo "4. Run same commands above"
          echo "5. Training resumes from latest HF Hub checkpoint"
          echo ""
          echo "CHECK STATUS:"
          echo "   python finetune/lightning_helper.py status"
          echo ""
          echo "RESET FOR NEW ACCOUNT:"
          echo "   python finetune/lightning_helper.py reset"
          echo "=========================================="
