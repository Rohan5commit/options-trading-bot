name: Retrain Model

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'build_dataset'
        type: choice
        options:
          - build_dataset
          - check_status
          - full_instructions

jobs:
  build-dataset:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'build_dataset' || github.event.inputs.action == 'full_instructions' }}
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build training dataset
        run: python finetune/build_dataset.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

      - name: Upload dataset as artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-data
          path: training_data/
          retention-days: 7

  check-status:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'check_status' }}
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check training status
        run: python finetune/lightning_helper.py status
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_CHECKPOINT_REPO: Rohan556/options-llm-checkpoints

  show-instructions:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'full_instructions' }}
    timeout-minutes: 5

    steps:
      - name: Print Training Instructions
        run: |
          echo "=========================================="
          echo "  Two-Phase Training Plan"
          echo "=========================================="
          echo ""
          echo "Total Budget: \$45"
          echo ""
          echo "PHASE 1: Lightning.ai"
          echo "  GPU: L4 at \$0.48/hr"
          echo "  Budget: \$15 (31.25 hours)"
          echo "  Steps:"
          echo "    1. Go to https://lightning.ai"
          echo "    2. Open Studio with L4 GPU"
          echo "    3. In terminal:"
          echo "       git clone https://github.com/Rohan5commit/options-trading-bot.git"
          echo "       cd options-trading-bot"
          echo "       export HF_TOKEN=your_token"
          echo "       bash finetune/run_lightning.sh"
          echo ""
          echo "PHASE 2: Modal.com"
          echo "  GPU: A10G at \$1.10/hr"
          echo "  Budget: \$30 (27.3 hours)"
          echo "  Steps:"
          echo "    1. Go to https://modal.com"
          echo "    2. pip install modal && modal setup"
          echo "    3. modal secret create options-training HF_TOKEN=your_token"
          echo "    4. modal deploy finetune/modal_train.py"
          echo ""
          echo "CHECK STATUS:"
          echo "  python finetune/lightning_helper.py status"
          echo ""
          echo "PHASE 2 INSTRUCTIONS:"
          echo "  python finetune/lightning_helper.py phase2"
          echo "=========================================="
